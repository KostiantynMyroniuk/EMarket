services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_server
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=55367Ed01!
      - MSSQL_PID=Developer                       
    ports:
      - "1433:1433"
    volumes:
      - ./sql-data:/var/opt/mssql
    networks:
      - emarket
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "55367Ed01!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:latest
    container_name: redisdb
    ports:
      - "6379:6379"
    networks: 
      - emarket
      
  identity.api:
    image: ${DOCKER_REGISTRY-}identityapi
    ports:
      - "5001:8080"
    build:
      context: .
      dockerfile: src/Identity.API/Dockerfile
    depends_on: 
      mssql:
        condition: service_healthy
    networks: 
      - emarket

  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    ports:
      - "5002:8080"
    build:
      context: .
      dockerfile: src/Catalog.API/Dockerfile
    depends_on: 
      mssql:
        condition: service_healthy
    networks: 
      - emarket

  cart.api:
    image: ${DOCKER_REGISTRY-}cartapi
    ports:
      - "5003:8080"
    build:
      context: .
      dockerfile: src/Cart.API/Dockerfile
    depends_on: 
      - redis
    networks: 
      - emarket

networks:
  emarket:
    driver: bridge